<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="description" content="Shubham's Internet — 2,000+ links curated from the web." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Links — Shubham Chandel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
        }
        html { height: 100%; }
        body {
            --accent: #E63946;
            --bg: #0a0a0a;
            --fg: #EFEFEF;
            --fg-dim: rgba(239, 239, 239, 0.45);
            --fg-mid: rgba(239, 239, 239, 0.7);
            --border: rgba(239, 239, 239, 0.08);
            background-color: var(--bg);
            color: var(--fg);
            min-height: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 36px 36px 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            opacity: 0.01;
            transform: translateY(10px);
            animation: apparition 1s forwards 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .monogram {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--fg);
            text-decoration: none;
            transition: color 0.3s;
        }
        .monogram:hover { color: var(--accent); }
        .count {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--fg-dim);
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-bottom: 50px;
        }
        .hero h1 {
            font-weight: 700;
            font-size: 120px;
            line-height: 0.9;
            letter-spacing: -0.02em;
            text-shadow: 2px 2px 0px var(--accent), 4px 4px 0px rgba(230,57,70,0.15);
            opacity: 0.01;
            transform: translateY(30px);
            animation: apparition 0.8s forwards 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .hero p {
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--fg-dim);
            margin-top: 20px;
            text-transform: none;
            opacity: 0.01;
            transform: translateY(15px);
            animation: apparition 0.8s forwards 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* SEARCH */
        .search-wrap {
            margin-bottom: 40px;
            opacity: 0.01;
            transform: translateY(10px);
            animation: apparition 0.8s forwards 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .search-row {
            display: flex;
            gap: 10px;
        }
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0 16px;
            transition: border-color 0.3s;
        }
        .search-box:focus-within { border-color: rgba(239, 239, 239, 0.25); }
        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--fg);
            text-transform: none;
            padding: 14px 0;
            caret-color: var(--accent);
            width: 100%;
        }
        .search-input::placeholder { color: var(--fg-dim); text-transform: none; }
        .search-btn {
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 14px 24px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .search-btn:hover { opacity: 0.85; }
        .search-btn:disabled { opacity: 0.4; cursor: default; }

        /* RESULTS */
        .results-message {
            font-size: 15px;
            color: var(--fg-mid);
            text-transform: none;
            line-height: 1.6;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .results {
            opacity: 0.01;
            transform: translateY(10px);
            animation: apparition 0.5s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .result-item {
            display: block;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            transition: padding-left 0.2s ease;
        }
        .result-item:hover { padding-left: 8px; }
        .result-item:hover .result-title { color: var(--accent); }
        .result-title {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.01em;
            line-height: 1.4;
            color: var(--fg);
            transition: color 0.2s;
            text-transform: none;
            word-break: break-word;
        }
        .result-meta {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            font-size: 11px;
            letter-spacing: 0.04em;
            color: var(--fg-dim);
            text-transform: none;
            flex-wrap: wrap;
        }
        .result-reason {
            font-size: 12px;
            color: var(--fg-dim);
            text-transform: none;
            line-height: 1.4;
            margin-top: 4px;
            word-break: break-word;
        }
        .result-desc {
            font-size: 13px;
            color: var(--fg-mid);
            text-transform: none;
            line-height: 1.5;
            margin-top: 6px;
            word-break: break-word;
        }
        .result-url {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        /* STATUS */
        .status {
            text-align: center;
            padding: 60px 0;
            color: var(--fg-dim);
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: none;
        }
        .loading-bar {
            width: 60px;
            height: 2px;
            background: var(--border);
            margin: 16px auto 0;
            border-radius: 1px;
            overflow: hidden;
        }
        .loading-bar::after {
            content: '';
            display: block;
            width: 30px;
            height: 100%;
            background: var(--accent);
            border-radius: 1px;
            animation: loadSlide 1s infinite ease-in-out;
        }

        /* FOOTER */
        .page-footer {
            margin-top: auto;
            padding-top: 60px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.06em;
            color: var(--fg-dim);
            opacity: 0.5;
        }

        @keyframes apparition {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes loadSlide {
            0% { transform: translateX(-30px); }
            50% { transform: translateX(60px); }
            100% { transform: translateX(-30px); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container { padding: 24px 16px 60px; }
            .hero h1 { font-size: 64px; }
            .hero { margin-bottom: 32px; }
            .hero p { font-size: 11px; margin-top: 14px; }
            header { margin-bottom: 36px; }
            .search-input { font-size: 16px; padding: 12px 0; }
            .search-btn { padding: 12px 20px; }
            .result-title { font-size: 15px; }
            .result-meta { flex-direction: column; gap: 2px; }
            .result-desc { font-size: 12px; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 48px; }
            .search-row { flex-direction: column; }
            .search-btn { padding: 14px; text-align: center; }
            .result-title { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a class="monogram" href="/">SC</a>
            <span class="count" id="total-count"></span>
        </header>

        <div class="hero">
            <h1>LINKS</h1>
            <p>things i've read, saved, and thought about</p>
        </div>

        <div class="search-wrap">
            <div class="search-row">
                <div class="search-box">
                    <input class="search-input" id="search" type="text" placeholder="Search again, get different links every time..." autocomplete="off" />
                </div>
                <button class="search-btn" id="search-btn" onclick="doSearch()">Search</button>
            </div>
        </div>

        <div id="results"></div>

        <div id="all-links">
            <div class="status">Loading...<div class="loading-bar"></div></div>
        </div>

        <div class="page-footer">
            shubham.lol
        </div>
    </div>

    <script>
    (function () {
        var AI_SERVER = '';

        var searchEl = document.getElementById('search');
        var btnEl = document.getElementById('search-btn');
        var resultsEl = document.getElementById('results');
        var allLinksEl = document.getElementById('all-links');
        var countEl = document.getElementById('total-count');
        var searching = false;
        var allLinks = [];

        function escapeHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatDate(raw) {
            if (!raw) return '';
            try {
                var d = new Date(raw);
                if (isNaN(d.getTime())) return '';
                var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
            } catch (e) { return ''; }
        }

        function shortenUrl(url) {
            try {
                var u = new URL(url);
                var path = u.pathname.length > 30 ? u.pathname.slice(0, 30) + '...' : u.pathname;
                return u.hostname + path;
            } catch (e) { return url; }
        }

        function renderLink(r, showDesc) {
            var date = formatDate(r.date);
            var html = '<a class="result-item" href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener">';
            html += '<div class="result-title">' + escapeHtml(r.title) + '</div>';
            if (showDesc && r.description) {
                html += '<div class="result-desc">' + escapeHtml(r.description).slice(0, 200) + '</div>';
            }
            html += '<div class="result-meta">';
            if (showDesc) html += '<span class="result-url">' + escapeHtml(shortenUrl(r.url)) + '</span>';
            if (date) html += '<span>' + date + '</span>';
            html += '</div></a>';
            return html;
        }

        function renderAllLinks() {
            if (allLinks.length === 0) return;
            var html = '<div class="results">';
            var batch = allLinks.slice(0, 200);
            for (var i = 0; i < batch.length; i++) {
                html += renderLink(batch[i], false);
            }
            if (allLinks.length > 200) {
                html += '<div class="status" id="load-more" style="cursor:pointer;padding:30px 0">Show all ' + allLinks.length + ' links</div>';
            }
            html += '</div>';
            allLinksEl.innerHTML = html;
            if (allLinks.length > 200) {
                document.getElementById('load-more').addEventListener('click', function () {
                    var h = '<div class="results">';
                    for (var j = 0; j < allLinks.length; j++) {
                        h += renderLink(allLinks[j], false);
                    }
                    h += '</div>';
                    allLinksEl.innerHTML = h;
                });
            }
        }

        // Load all links from Convex via Vercel API, fall back to static
        fetch('/api/links')
            .then(function (r) { if (!r.ok) throw 0; return r.json(); })
            .catch(function () { return fetch('/links/links.json').then(function (r) { return r.json(); }); })
            .then(function (data) {
                allLinks = data;
                countEl.textContent = data.length + ' links';
                renderAllLinks();
            })
            .catch(function () {
                allLinksEl.innerHTML = '<div class="status">Failed to load links</div>';
            });

        // AI search
        window.doSearch = async function () {
            var q = searchEl.value.trim();
            if (!q || searching) return;

            searching = true;
            btnEl.disabled = true;
            btnEl.textContent = '...';
            allLinksEl.style.display = 'none';
            resultsEl.innerHTML = '<div class="status">Searching through ' + allLinks.length + '+ links...<div class="loading-bar"></div></div>';

            try {
                var resp = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q }),
                });
                var data = await resp.json();
                var results = data.results || [];

                if (results.length === 0) {
                    resultsEl.innerHTML = '<div class="status">No links found for that query.</div>';
                    return;
                }

                var html = '<div class="results">';
                if (data.message) {
                    html += '<div class="results-message">' + escapeHtml(data.message) + '</div>';
                }
                for (var i = 0; i < results.length; i++) {
                    html += renderLink(results[i], false);
                }
                html += '</div>';
                resultsEl.innerHTML = html;

            } catch (e) {
                resultsEl.innerHTML = '<div class="status">Search server is offline.</div>';
            } finally {
                searching = false;
                btnEl.disabled = false;
                btnEl.textContent = 'Search';
            }
        };

        function clearResults() {
            searchEl.value = '';
            resultsEl.innerHTML = '';
            allLinksEl.style.display = '';
        }

        searchEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doSearch();
            if (e.key === 'Escape') { clearResults(); searchEl.blur(); }
        });

        searchEl.addEventListener('input', function () {
            if (!searchEl.value.trim()) clearResults();
        });

        document.addEventListener('keydown', function (e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                searchEl.focus();
                searchEl.select();
            }
        });
    })();
    </script>
</body>
</html>
