<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="description" content="Shubham's Internet — 2,000+ links curated from the web." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css" />
    <title>Links — Shubham Chandel</title>
    <style>
        /* Links page overrides */
        body { overflow: auto; height: auto; min-height: 100%; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            height: auto;
            min-height: 100vh;
            overflow: visible;
        }
        main {
            margin-bottom: 0;
            align-items: stretch;
            text-align: left;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }
        .hero h1 {
            font-weight: 700;
            font-size: 120px;
            line-height: 0.9;
            letter-spacing: -0.02em;
            text-shadow: 2px 2px 0px var(--accent, #E63946), 4px 4px 0px rgba(230,57,70,0.15);
            opacity: 0.01;
            transform: translateY(30px);
            animation: mainApparition 0.8s forwards 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .hero p {
            font-size: 12px;
            letter-spacing: 0.08em;
            color: rgba(239, 239, 239, 0.45);
            margin-top: 20px;
            text-transform: none;
            opacity: 0.01;
            transform: translateY(15px);
            animation: mainApparition 0.8s forwards 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        body.day-mode .hero p { color: rgba(17, 17, 17, 0.45); }

        .search-wrap {
            margin-bottom: 40px;
            opacity: 0.01;
            transform: translateY(10px);
            animation: mainApparition 0.8s forwards 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .search-row { display: flex; gap: 10px; }
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            border: 1px solid rgba(239, 239, 239, 0.08);
            border-radius: 4px;
            padding: 0 16px;
            transition: border-color 0.3s;
        }
        body.day-mode .search-box { border-color: rgba(17, 17, 17, 0.12); }
        .search-box:focus-within { border-color: rgba(239, 239, 239, 0.25); }
        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: #EFEFEF;
            padding: 14px 0;
            caret-color: #E63946;
            width: 100%;
        }
        body.day-mode .search-input { color: #111111; }
        .search-input::placeholder { color: rgba(239, 239, 239, 0.45); }
        body.day-mode .search-input::placeholder { color: rgba(17, 17, 17, 0.45); }
        .search-btn {
            background: #E63946;
            border: none;
            border-radius: 4px;
            color: #EFEFEF;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 14px 24px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .search-btn:hover { opacity: 0.85; }
        .search-btn:disabled { opacity: 0.4; cursor: default; }

        .results-message {
            font-size: 15px;
            color: rgba(239, 239, 239, 0.7);
            text-transform: none;
            line-height: 1.6;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(239, 239, 239, 0.08);
        }
        .results {
            opacity: 0.01;
            transform: translateY(10px);
            animation: mainApparition 0.5s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .result-item {
            display: block;
            padding: 16px 0;
            border-bottom: 1px solid rgba(239, 239, 239, 0.08);
            text-decoration: none;
            transition: padding-left 0.2s ease;
        }
        body.day-mode .result-item { border-bottom-color: rgba(17, 17, 17, 0.08); }
        .result-item:hover { padding-left: 8px; }
        .result-item:hover .result-title { color: #E63946; }
        .result-title {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.01em;
            line-height: 1.4;
            color: #EFEFEF;
            transition: color 0.2s;
            text-transform: none;
            word-break: break-word;
        }
        body.day-mode .result-title { color: #111111; }
        .result-meta {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            font-size: 13px;
            letter-spacing: 0.04em;
            color: rgba(239, 239, 239, 0.45);
            text-transform: none;
            flex-wrap: wrap;
        }
        body.day-mode .result-meta { color: rgba(17, 17, 17, 0.45); }
        .result-reason {
            font-size: 12px;
            color: rgba(239, 239, 239, 0.45);
            text-transform: none;
            line-height: 1.4;
            margin-top: 4px;
            word-break: break-word;
        }
        .result-desc {
            font-size: 16px;
            color: rgba(239, 239, 239, 0.7);
            text-transform: none;
            line-height: 1.5;
            margin-top: 6px;
            word-break: break-word;
        }
        body.day-mode .result-desc { color: rgba(17, 17, 17, 0.7); }
        .result-url {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        .status {
            text-align: center;
            padding: 60px 0;
            color: rgba(239, 239, 239, 0.45);
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: none;
        }
        .loading-bar {
            width: 60px;
            height: 2px;
            background: rgba(239, 239, 239, 0.08);
            margin: 16px auto 0;
            border-radius: 1px;
            overflow: hidden;
        }
        .loading-bar::after {
            content: '';
            display: block;
            width: 30px;
            height: 100%;
            background: #E63946;
            border-radius: 1px;
            animation: loadSlide 1s infinite ease-in-out;
        }
        @keyframes loadSlide {
            0% { transform: translateX(-30px); }
            50% { transform: translateX(60px); }
            100% { transform: translateX(-30px); }
        }

        .page-footer {
            margin-top: auto;
            padding-top: 60px;
            padding-bottom: 30px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.06em;
            color: rgba(239, 239, 239, 0.45);
            opacity: 0.5;
        }

        .count {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: rgba(239, 239, 239, 0.45);
        }
        body.day-mode .count { color: rgba(17, 17, 17, 0.45); }

        @media (max-width: 768px) {
            .container { padding: 24px 16px 60px; }
            .hero h1 { font-size: 64px; }
            .hero { margin-bottom: 32px; }
            .hero p { font-size: 11px; margin-top: 14px; }
            .search-input { font-size: 16px; padding: 12px 0; }
            .search-btn { padding: 12px 20px; }
            .result-title { font-size: 15px; }
            .result-meta { flex-direction: column; gap: 2px; }
            .result-desc { font-size: 12px; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 48px; }
            .search-row { flex-direction: column; }
            .search-btn { padding: 14px; text-align: center; }
            .result-title { font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- Grain + sunlight overlays -->
    <div id="grain-overlay"></div>
    <div id="sunlight-1"></div>
    <div id="sunlight-2"></div>

    <div class="container">
        <!-- Same header as main page -->
        <header>
            <div class="logo-okey">
                <a href="/" style="text-decoration:none;color:inherit"><span class="monogram">SC</span></a>
            </div>

            <div class="header-center">
                <a href="/" style="text-decoration:none;color:inherit">SAY HELLO</a>
            </div>

            <div class="toggle-mode">
                <div class="toggle-cap-container clickable">
                    <div class="toogle-btn"></div>
                </div>
            </div>
        </header>

        <main>
            <div class="hero">
                <h1>LINKS</h1>
                <p>things i've read, saved, and thought about — <span class="count" id="total-count"></span></p>
            </div>

            <div class="search-wrap">
                <div class="search-row">
                    <div class="search-box">
                        <input class="search-input" id="search" type="text" placeholder="Search again, get different links every time..." autocomplete="off" />
                    </div>
                    <button class="search-btn" id="search-btn" onclick="doSearch()">Search</button>
                </div>
            </div>

            <div id="results"></div>

            <div id="all-links">
                <div class="status">Loading...<div class="loading-bar"></div></div>
            </div>
        </main>

        <div class="page-footer">
            shubham.lol
        </div>
    </div>

    <script>
    // Day/night toggle
    (function() {
        var isDay = false;
        document.body.classList.add('night-mode');

        var toggle = document.querySelector('.toggle-cap-container');
        function toggleMode() {
            isDay = !isDay;
            document.body.classList.remove('day-mode', 'night-mode');
            document.body.classList.add(isDay ? 'day-mode' : 'night-mode');
        }
        if (toggle) toggle.addEventListener('click', toggleMode);

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'd' || e.key === 'D') toggleMode();
        });
    })();

    // Links functionality
    (function () {
        var searchEl = document.getElementById('search');
        var btnEl = document.getElementById('search-btn');
        var resultsEl = document.getElementById('results');
        var allLinksEl = document.getElementById('all-links');
        var countEl = document.getElementById('total-count');
        var searching = false;
        var allLinks = [];

        function escapeHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatDate(raw) {
            if (!raw) return '';
            try {
                var d = new Date(raw);
                if (isNaN(d.getTime())) return '';
                var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
            } catch (e) { return ''; }
        }

        function shortenUrl(url) {
            try {
                var u = new URL(url);
                var path = u.pathname.length > 30 ? u.pathname.slice(0, 30) + '...' : u.pathname;
                return u.hostname + path;
            } catch (e) { return url; }
        }

        function renderLink(r, showDesc) {
            var date = formatDate(r.date);
            var html = '<a class="result-item" href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener">';
            html += '<div class="result-title">' + escapeHtml(r.title) + '</div>';
            if (showDesc && r.description) {
                html += '<div class="result-desc">' + escapeHtml(r.description).slice(0, 200) + '</div>';
            }
            html += '<div class="result-meta">';
            if (showDesc) html += '<span class="result-url">' + escapeHtml(shortenUrl(r.url)) + '</span>';
            if (date) html += '<span>' + date + '</span>';
            html += '</div></a>';
            return html;
        }

        var nextCursor = null;
        var loading = false;

        function renderAllLinks() {
            if (allLinks.length === 0) return;
            var html = '<div class="results">';
            for (var i = 0; i < allLinks.length; i++) {
                html += renderLink(allLinks[i], true);
            }
            if (nextCursor) {
                html += '<div class="status" id="load-more" style="cursor:pointer;padding:30px 0">Load more</div>';
            }
            html += '</div>';
            allLinksEl.innerHTML = html;
            if (nextCursor) {
                document.getElementById('load-more').addEventListener('click', fetchPage);
            }
        }

        function fetchPage() {
            if (loading) return;
            loading = true;
            var url = '/api/links' + (nextCursor ? '?cursor=' + encodeURIComponent(nextCursor) : '');
            fetch(url)
                .then(function (r) { if (!r.ok) throw 0; return r.json(); })
                .then(function (data) {
                    allLinks = allLinks.concat(data.links);
                    nextCursor = data.cursor;
                    countEl.textContent = allLinks.length + (nextCursor ? '+' : '') + ' links';
                    renderAllLinks();
                })
                .catch(function () {
                    if (allLinks.length === 0) allLinksEl.innerHTML = '<div class="status">Failed to load links</div>';
                })
                .finally(function () { loading = false; });
        }

        fetchPage();

        window.doSearch = async function () {
            var q = searchEl.value.trim();
            if (!q || searching) return;

            searching = true;
            btnEl.disabled = true;
            btnEl.textContent = '...';
            allLinksEl.style.display = 'none';
            resultsEl.innerHTML = '<div class="status">Searching through ' + allLinks.length + '+ links...<div class="loading-bar"></div></div>';

            try {
                var resp = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q }),
                });
                var data = await resp.json();
                var results = data.results || [];

                if (results.length === 0) {
                    resultsEl.innerHTML = '<div class="status">No links found for that query.</div>';
                    return;
                }

                var html = '<div class="results">';
                if (data.message) {
                    html += '<div class="results-message">' + escapeHtml(data.message) + '</div>';
                }
                for (var i = 0; i < results.length; i++) {
                    html += renderLink(results[i], true);
                }
                html += '</div>';
                resultsEl.innerHTML = html;

            } catch (e) {
                resultsEl.innerHTML = '<div class="status">Search server is offline.</div>';
            } finally {
                searching = false;
                btnEl.disabled = false;
                btnEl.textContent = 'Search';
            }
        };

        function clearResults() {
            searchEl.value = '';
            resultsEl.innerHTML = '';
            allLinksEl.style.display = '';
        }

        searchEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doSearch();
            if (e.key === 'Escape') { clearResults(); searchEl.blur(); }
        });

        searchEl.addEventListener('input', function () {
            if (!searchEl.value.trim()) clearResults();
        });

        document.addEventListener('keydown', function (e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                searchEl.focus();
                searchEl.select();
            }
        });
    })();
    </script>
</body>
</html>
